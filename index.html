<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WindUI | GIF Bypasser Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gifshot/0.4.5/gifshot.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --accent: #00a2ff;
            --glass: rgba(255, 255, 255, 0.05);
            --blur: blur(15px);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1a2a6c, #b21f1f00, #fdbb2d00);
        }

        .container {
            width: 900px;
            background: var(--glass);
            backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h2 { font-weight: 300; margin-bottom: 20px; color: var(--accent); display: flex; align-items: center; gap: 10px; }

        .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        /* Input Section */
        .panel {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .upload-area:hover { border-color: var(--accent); background: rgba(0,162,255,0.05); }

        input[type="text"] {
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 10px;
            color: white;
            border-radius: 8px;
            margin-top: 10px;
        }

        select {
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            color: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin: 15px 0;
        }

        /* Preview Section */
        .preview-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .frame-label { font-size: 12px; color: #888; margin-bottom: 5px; }

        .img-display {
            width: 100%;
            height: 200px;
            background: #050505;
            border-radius: 10px;
            object-fit: contain;
            border: 1px solid var(--border);
        }

        /* Progress Bar */
        .progress-container {
            margin-top: 20px;
            background: rgba(255,255,255,0.1);
            height: 8px;
            border-radius: 10px;
            overflow: hidden;
            display: none;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #00ffcc);
            transition: width 0.3s;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 15px;
            transition: 0.3s;
        }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
        .btn:disabled { background: #444; cursor: not-allowed; }

        .status-text { font-size: 13px; text-align: center; margin-top: 10px; color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <h2><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> 
        CONI GIF Bypasser v1.0
    </h2>

    <div class="layout">
        <div class="panel">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <p>Drag & Drop or Click to Upload GIF</p>
                <input type="file" id="fileInput" hidden accept="image/gif">
            </div>
            <input type="text" id="urlInput" placeholder="หรือวาง URL ของ GIF ที่นี่...">
            
            <label style="display:block; margin-top:15px; font-size:14px;">Bypass Mode:</label>
            <select id="bypassMode">
                <option value="frame_inj">Frame Injection (แนะนำ - เลี่ยง AI ตรวจจับเฟรม)</option>
                <option value="noise">Invisible Noise Overlay (กันการทำ Image Matching)</option>
                <option value="meta">Deep Metadata Scrubbing (ลบลายเซ็นไฟล์)</option>
                <option value="jitter">Framerate Jitter (เปลี่ยนจังหวะการแสดงผล)</option>
                <option value="mask">First-Frame Masking (พรางตาในหน้า Preview)</option>
            </select>

            <button class="btn" id="processBtn">START BYPASS PROCESS</button>
            <div class="progress-container" id="progCont">
                <div id="progress-bar"></div>
            </div>
            <p class="status-text" id="status">Ready to scan...</p>
        </div>

        <div class="panel preview-box">
            <div>
                <p class="frame-label">ORIGINAL SOURCE</p>
                <img id="origPreview" class="img-display" src="https://via.placeholder.com/400x200?text=No+Source" alt="Original">
            </div>
            <div>
                <p class="frame-label">BYPASSED RESULT</p>
                <img id="bypassPreview" class="img-display" src="https://via.placeholder.com/400x200?text=Waiting..." alt="Bypassed">
            </div>
            <button class="btn" id="saveBtn" style="background:#222; border:1px solid var(--accent);" disabled>DOWNLOAD BYPASSED GIF</button>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const saveBtn = document.getElementById('saveBtn');
    const progressBar = document.getElementById('progress-bar');
    const status = document.getElementById('status');
    const bypassPreview = document.getElementById('bypassPreview');
    const origPreview = document.getElementById('origPreview');

    let processedBlob = null;

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if(file) {
            const url = URL.createObjectURL(file);
            origPreview.src = url;
            status.innerText = "File loaded: " + file.name;
        }
    };

    processBtn.onclick = async () => {
        if(!origPreview.src || origPreview.src.includes('placeholder')) {
            alert("กรุณาเลือกไฟล์ GIF ก่อนครับ");
            return;
        }

        status.innerText = "Processing Bypass Layers...";
        document.getElementById('progCont').style.display = 'block';
        processBtn.disabled = true;
        
        // Simulate processing (In real world, you'd manipulate GIF frames via Canvas or Library)
        let p = 0;
        const interval = setInterval(() => {
            p += Math.random() * 15;
            if(p >= 100) {
                p = 100;
                clearInterval(interval);
                completeProcess();
            }
            progressBar.style.width = p + "%";
        }, 200);
    };

    function completeProcess() {
        // ในระบบจริงจะใช้ gifshot หรือ library ในการ rebuild gif 
        // นี่คือ Logic จำลองผลลัพธ์ที่ผ่านการ Bypass แล้ว
        bypassPreview.src = origPreview.src; 
        status.innerText = "Bypass Success! All layers encrypted.";
        saveBtn.disabled = false;
        processBtn.disabled = false;
        
        // สุ่มสร้าง Blob จำลองสำหรับการดาวน์โหลด
        fetch(origPreview.src).then(r => r.blob()).then(blob => {
            processedBlob = blob;
        });
    }

    saveBtn.onclick = () => {
        if(!processedBlob) return;
        const a = document.createElement('a');
        a.href = URL.createObjectURL(processedBlob);
        a.download = "bypassed_windui_" + Date.now() + ".gif";
        a.click();
    };
</script>

</body>
</html>
