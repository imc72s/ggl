<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gay Orientation Analysis Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            --glass: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: #f0f2f5;
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        #quiz-container {
            background: var(--glass);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            transition: all 0.5s ease;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        #progress {
            width: 0%;
            height: 100%;
            background: var(--primary-gradient);
            transition: width 0.3s ease;
        }

        h2 { color: #2d3436; margin-bottom: 25px; font-weight: 600; }

        .options-grid {
            display: grid;
            gap: 15px;
        }

        .option-btn {
            background: white;
            border: 2px solid #e0e0e0;
            padding: 15px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-family: 'Kanit', sans-serif;
            transition: all 0.2s;
            text-align: left;
        }

        .option-btn:hover {
            border-color: #764ba2;
            background: #f8f9ff;
            transform: translateY(-2px);
        }

        .hidden { display: none; }

        #result-area {
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title { font-size: 24px; color: #764ba2; margin-top: 20px; }
        .result-desc { color: #636e72; line-height: 1.6; margin-top: 15px; }
        
        .restart-btn {
            margin-top: 30px;
            padding: 12px 30px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="intro">
        <h1>แบบทดสอบความหลากหลายทางเพศ</h1>
        <p>วิเคราะห์ตัวตนของคุณผ่าน 20 คำถามเชิงจิตวิทยาและพฤติกรรม</p>
        <button class="restart-btn" onclick="startQuiz()">เริ่มทำแบบทดสอบ</button>
    </div>

    <div id="quiz-content" class="hidden">
        <div class="progress-bar"><div id="progress"></div></div>
        <h2 id="question-text">คำถามจะปรากฏที่นี่</h2>
        <div class="options-grid" id="options-container">
            </div>
    </div>

    <div id="result-area" class="hidden">
        <div style="font-size: 50px;">✨</div>
        <div class="result-title" id="res-title">ผลลัพธ์ของคุณ</div>
        <div class="result-desc" id="res-desc">คำอธิบาย</div>
        <button class="restart-btn" onclick="location.reload()">ทำใหม่อีกครั้ง</button>
    </div>
</div>

<script>
    const questions = [
        { q: "คุณรู้สึกดึงดูดทางเพศกับเพศไหนมากที่สุด?", a: ["ผู้ชาย", "ผู้หญิง", "ได้ทั้งสองเพศ", "ไม่รู้สึกกับเพศไหนเลย"], s: [5, 0, 3, 1] },
        { q: "เวลาเห็นผู้ชายที่ดูดี คุณมักจะนึกถึงอะไรเป็นอันดับแรก?", a: ["ชื่นชมในฐานะต้นแบบ", "รู้สึกใจเต้นแรง", "เฉยๆ ไม่คิดอะไร", "อยากเข้าไปทำความรู้จักเชิงชู้สาว"], s: [1, 5, 0, 4] },
        { q: "คุณเคยจินตนาการถึงการใช้ชีวิตคู่กับคนเพศเดียวกันไหม?", a: ["บ่อยครั้ง", "บางครั้ง", "แทบไม่เคย", "ไม่เคยเลย"], s: [5, 3, 1, 0] },
        { q: "คุณรู้สึกสบายใจที่จะแสดงความอ่อนแอหรือความรู้สึกกับใคร?", a: ["ผู้หญิง", "ผู้ชาย", "เพื่อนสนิท (ไม่เกี่ยงเพศ)", "เก็บไว้คนเดียว"], s: [1, 4, 2, 0] },
        { q: "สไตล์การแต่งกายที่คุณชอบมักจะเป็นแบบไหน?", a: ["เน้นเนี้ยบและดูดีเป็นพิเศษ", "เน้นความแมน/ลุยๆ", "ตามแฟชั่นทั่วไป", "ยังไงก็ได้"], s: [4, 1, 2, 0] },
        { q: "คุณรู้สึกอย่างไรกับคำนิยามว่า 'LGBTQ+'?", a: ["รู้สึกเป็นส่วนหนึ่ง", "สนับสนุนแต่ไม่ใช่พวกเรา", "เฉยๆ", "ไม่ค่อยเข้าใจ"], s: [5, 2, 1, 0] },
        { q: "เวลาคุณมีความรัก คุณมักจะเป็นฝ่ายไหน?", a: ["ฝ่ายดูแล (Protector)", "ฝ่ายถูกดูแล (Nurtured)", "สลับกันไป", "ไม่แน่ใจ"], s: [3, 4, 5, 1] },
        { q: "คุณชอบดูสื่อ (หนัง/ซีรีส์) แนวชายรักชายหรือไม่?", a: ["ชอบมาก ดูเป็นประจำ", "ดูได้ถ้าสนุก", "ไม่ค่อยดู", "ไม่ชอบเลย"], s: [5, 3, 1, 0] },
        { q: "ในวัยเด็ก คุณมักจะเล่นกับกลุ่มไหน?", a: ["กลุ่มผู้หญิง", "กลุ่มผู้ชาย", "เล่นคนเดียว", "เข้าได้กับทุกคน"], s: [4, 1, 2, 2] },
        { q: "คุณให้ความสำคัญกับการดูแลผิวพรรณหรือรูปร่างแค่ไหน?", a: ["สูงมาก", "ปานกลาง", "ตามความจำเป็น", "ไม่เลย"], s: [4, 2, 1, 0] },
        { q: "ถ้ามีคนเพศเดียวกันมาจีบ คุณจะรู้สึกอย่างไร?", a: ["เขินอาย/ดีใจ", "ลองคุยดูไม่เสียหาย", "อึดอัด", "ปฏิเสธทันที"], s: [5, 3, 1, 0] },
        { q: "คุณเคยแอบชอบเพื่อนสนิทเพศเดียวกันไหม?", a: ["เคยและยังรู้สึกอยู่", "เคยตอนเด็กๆ", "ไม่แน่ใจว่าเป็นความรักไหม", "ไม่เคยเลย"], s: [5, 2, 3, 0] },
        { q: "คุณคิดว่าความเซ็กซี่ของผู้ชายอยู่ที่ตรงไหน?", a: ["กล้ามเนื้อ/รูปร่าง", "สายตา/รอยยิ้ม", "ทัศนคติ", "ไม่เคยมองผู้ชายว่าเซ็กซี่"], s: [5, 4, 3, 0] },
        { q: "คุณชอบสังคมที่เต็มไปด้วยผู้ชายหรือผู้หญิงมากกว่า?", a: ["ผู้ชายล้วน", "ผู้หญิงล้วน", "ผสมผสาน", "ชอบอยู่คนเดียว"], s: [4, 2, 1, 1] },
        { q: "รสนิยมเพลงของคุณมักจะโน้มเอียงไปทางไหน?", a: ["Diva/Pop หญิง", "Rock/Hip-hop", "Indie/Jazz", "เพลงตลาดทั่วไป"], s: [5, 1, 2, 2] },
        { q: "คุณเคยสงสัยในเพศสภาพของตัวเองบ่อยแค่ไหน?", a: ["ทุกวัน", "นานๆ ที", "ตอนเห็นคนหล่อ", "ไม่เคยเลย"], s: [5, 2, 3, 0] },
        { q: "คุณมองอนาคตการมีครอบครัวไว้แบบไหน?", a: ["แต่งงานกับผู้หญิง", "อยู่กับคนที่เราชอบ(เพศไหนก็ได้)", "อยู่คนเดียว", "แต่งงานกับผู้ชาย"], s: [0, 3, 1, 5] },
        { q: "การสัมผัสร่างกายจากเพศเดียวกันทำให้คุณรู้สึก...", a: ["อบอุ่น/ตื่นเต้น", "ปกติ", "แปลกๆ", "ไม่ชอบ"], s: [5, 2, 1, 0] },
        { q: "คุณชอบเข้ายิมเพื่ออะไร?", a: ["เพื่อให้ผู้ชายมอง/ดึงดูด", "เพื่อให้ผู้หญิงชอบ", "เพื่อสุขภาพ", "ไม่เข้ายิม"], s: [5, 1, 2, 0] },
        { q: "สุดท้ายแล้ว คุณคิดว่าคุณคือใคร?", a: ["ชายแท้", "เกย์", "ไบเซ็กชวล", "ยังค้นหาอยู่"], s: [0, 5, 4, 3] }
    ];

    let currentStep = 0;
    let totalScore = 0;

    function startQuiz() {
        document.getElementById('intro').classList.add('hidden');
        document.getElementById('quiz-content').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentStep];
        document.getElementById('question-text').innerText = (currentStep + 1) + ". " + q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.a.forEach((ans, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = ans;
            btn.onclick = () => nextStep(q.s[index]);
            container.appendChild(btn);
        });

        const progress = ((currentStep) / questions.length) * 100;
        document.getElementById('progress').style.width = progress + "%";
    }

    function nextStep(score) {
        totalScore += score;
        currentStep++;

        if (currentStep < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-content').classList.add('hidden');
        document.getElementById('result-area').classList.remove('hidden');
        
        let title = "";
        let desc = "";

        if (totalScore >= 85) {
            title = "คุณคือ: Gay (ชัดเจนในตัวตน)";
            desc = "คุณมีความชัดเจนในรสนิยมทางเพศและการดึงดูดต่อเพศเดียวกันสูงมาก มีความภาคภูมิใจในตัวตนและมีไลฟ์สไตล์ที่สอดคล้องกับหัวใจตัวเอง";
        } else if (totalScore >= 65) {
            title = "คุณคือ: Soft Gay / Cute Boy";
            desc = "คุณมีความอ่อนโยนและมีความเป็นเกย์ในตัวสูง แต่มักจะแสดงออกในรูปแบบที่นุ่มนวล หรืออาจจะเป็นคนที่ชอบดูแลตัวเองและมีเสน่ห์ดึงดูดเพศเดียวกัน";
        } else if (totalScore >= 45) {
            title = "คุณคือ: Bisexual / Versatile";
            desc = "คุณมีความยืดหยุ่นทางเพศ สามารถมองเห็นเสน่ห์ของทั้งสองเพศได้ ความรักของคุณไม่ได้ถูกจำกัดด้วยเรื่องเพศเพียงอย่างเดียว";
        } else if (totalScore >= 20) {
            title = "คุณคือ: Questioning / Heteroflexible";
            desc = "คุณอาจจะเป็นชายแท้ที่มีความเปิดกว้างทางความคิด หรือกำลังอยู่ในช่วงค้นหาตัวตน มีบางมุมที่ละเอียดอ่อนกว่ามาตรฐานทั่วไป";
        } else {
            title = "คุณคือ: Straight (ชายแท้)";
            desc = "รสนิยมของคุณเน้นหนักไปทางเพศตรงข้ามอย่างชัดเจน มีความเป็นชายตามแบบมาตรฐานและมีความมั่นคงในตัวตนเดิม";
        }

        document.getElementById('res-title').innerText = title;
        document.getElementById('res-desc').innerText = desc;
    }
</script>

</body>
</html>
